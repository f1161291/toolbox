services:
  moontv:
    image: mtvpls/moontvplus-lite:latest
    container_name: moontv
    restart: always
    ports:
      - '8096:3000'
    environment:
      - USERNAME=admin
      - PASSWORD=            #设置自己的登录密码
      - ENABLE_TVBOX_SUBSCRIBE=true
#      - TVBOX_SUBSCRIBE_TOKEN=        设置自己的登录密码
      - NEXT_PUBLIC_STORAGE_TYPE=kvrocks
      - KVROCKS_URL=redis://moontv-kvrocks:6666
    networks:
      - moontv-network
    depends_on:
      - moontv-kvrocks
  moontv-kvrocks:
    image: apache/kvrocks
    container_name: moontv-kvrocks
    restart: always
    volumes:
      - kvrocks-data:/var/lib/kvrocks/data
    networks:
      - moontv-network
networks:
  moontv-network:
    driver: bridge
volumes:
  kvrocks-data:
